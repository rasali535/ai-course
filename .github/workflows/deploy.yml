# Unified Deployment for Hostinger (Frontend & Backend)
name: Deploy to Hostinger

on:
  push:
    branches: [ main ]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/deploy.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy-frontend:
    name: Frontend Deployment
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🟢 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package.json"

      - name: 📦 Install dependencies
        working-directory: ./frontend
        run: npm install --legacy-peer-deps

      - name: 🏗️ Build React App
        working-directory: ./frontend
        run: |
          if [ -z "$REACT_APP_API_URL" ] || [ "$REACT_APP_API_URL" = "https://pohei.de/api" ]; then
            export REACT_APP_API_URL="https://ai-course-e97p.onrender.com"
          fi
          npm run build
        env:
          CI: false
          REACT_APP_API_URL: ${{ secrets.REACT_APP_API_URL }}

      - name: 📝 Create .htaccess
        run: |
          cat <<EOT > frontend/build/.htaccess
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_FILENAME} !-l
            RewriteRule . /index.html [L]
          </IfModule>
          EOT

      - name: 📂 Sync to Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: 46.202.180.226
          username: u723774100.pohei.de
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./frontend/build/
          server-dir: ./public_html/
          port: 21
          protocol: ftp
          security: loose
          dangerous-clean-slate: false

  deploy-backend:
    name: Backend Docker Publish
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🏗️ Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: rasali/ai-course-backend:latest
