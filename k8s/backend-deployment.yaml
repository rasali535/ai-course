apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: your-docker-registry/ai-course-backend:latest # Replace with your image
        ports:
        - containerPort: 8080
        envFrom:
        - secretRef:
            name: backend-secrets
        env:
        - name: PORT
          value: "8080"
        # Readiness/Liveness probes are good practice
        readinessProbe:
          httpGet:
            path: /api
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
